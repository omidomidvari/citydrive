<!DOCTYPE html>
<html>
<head>
    <title>3D City Drive - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #112; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><b>WASD</b> to Drive | <b>Space</b> to Brake</div>

    <!-- 1. The Import Map (Fixes "THREE is not defined") -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.Fog(0x050510, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        scene.add(new THREE.AmbientLight(0x404040, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- CAR MODEL ---
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.2), new THREE.MeshPhongMaterial({ color: 0xee1111 }));
        body.position.y = 0.6;
        car.add(body);

        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        cabin.position.set(0, 1.1, -0.2);
        car.add(cabin);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.3, 12);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
        [[-0.7,0.3,0.7], [0.7,0.3,0.7], [-0.7,0.3,-0.7], [0.7,0.3,-0.7]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.z = Math.PI/2;
            w.position.set(...p);
            car.add(w);
        });
        scene.add(car);

        // --- CITY ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({ color: 0x111111 }));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        for(let i=0; i<100; i++) {
            const h = 5 + Math.random() * 15;
            const b = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshPhongMaterial({ color: 0x222244 }));
            b.position.set((Math.random()-0.5)*150, h/2, (Math.random()-0.5)*150);
            if(Math.abs(b.position.x) < 6) b.position.x += 12;
            scene.add(b);
        }

        // --- DRIVE CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let speed = 0, turn = 0;

        function animate() {
            requestAnimationFrame(animate);

            if(keys['KeyW']) speed += 0.008;
            if(keys['KeyS']) speed -= 0.008;
            if(keys['KeyA']) turn += 0.002;
            if(keys['KeyD']) turn -= 0.002;
            if(keys['Space']) speed *= 0.9;

            speed *= 0.97; turn *= 0.88;
            car.rotation.y += turn * speed * 3;
            car.translateZ(speed);

            // Smooth Camera Follow
            const offset = new THREE.Vector3(0, 4, -8).applyQuaternion(car.quaternion).add(car.position);
            camera.position.lerp(offset, 0.1);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
